name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    # 1. Backend Build & Test
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore Backend Dependencies
      run: dotnet restore service_domain_api/ServiceDomain.sln

    - name: Build Backend Solution
      run: dotnet build service_domain_api/ServiceDomain.sln --no-restore --configuration Release

    - name: Run C# Unit Tests
      run: dotnet test service_domain_api/ServiceDomain.sln --no-build --configuration Release --verbosity normal

    # 2. Frontend Build
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: logistica-app/package-lock.json

    - name: Build React Frontend
      run: |
        npm ci
        npm run build
      working-directory: ./logistica-app

  deploy:
    name: Deploy to Cloud (CD)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      # Certifique-se de que estes nomes correspondem exatamente aos nomes dos serviços criados no painel do Railway
      RAILWAY_API_SERVICE: "service-domain-api"
      RAILWAY_WORKER_SERVICE: "service-domain-worker"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    # Deploy Backend Services to Railway via Railway CLI
    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Deploy API to Railway
      run: railway up --service ${{ env.RAILWAY_API_SERVICE }} -d
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      working-directory: ./service_domain_api

    - name: Deploy Worker to Railway
      run: railway up --service ${{ env.RAILWAY_WORKER_SERVICE }} -d
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      working-directory: ./service_domain_api

    # Deploy Frontend React App to Vercel (Official Vercel CLI)
    - name: Install Vercel CLI
      run: npm install -g vercel

    - name: Pull Vercel Project Info
      run: vercel pull --yes --environment=production
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Build Project Artifacts
      run: vercel build --prod
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
