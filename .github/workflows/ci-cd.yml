name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    # 1. Backend Build & Test
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore Backend Dependencies
      run: dotnet restore

    - name: Build Backend Solution
      run: dotnet build --no-restore --configuration Release

    - name: Run C# Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

    # 2. Frontend Build
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: logistica-app/package-lock.json

    - name: Build React Frontend
      run: |
        cd logistica-app
        npm ci
        npm run build

  deploy:
    name: Deploy to Cloud (CD)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    # Deploy Backend Services to Railway via Railway CLI
    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Deploy API to Railway
      run: railway up --service service-domain-api -d
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Deploy Worker to Railway
      run: railway up --service service-domain-worker -d
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    # Deploy Frontend React App to Vercel
    - name: Deploy Frontend to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: ./logistica-app
